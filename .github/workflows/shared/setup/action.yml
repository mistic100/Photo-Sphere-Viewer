name: setup

inputs:
  turbo-cache:
    default: 'true'

runs:
  using: composite

  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'yarn'

    - name: env
      shell: bash
      run: |
        echo "SHORT_SHA=`echo ${{ github.sha }} | cut -c1-8`" >> $GITHUB_ENV
        echo "REF_NAME_SLUG=${GITHUB_REF_NAME////_}" >> $GITHUB_ENV

    - name: turbo cache
      uses: actions/cache@v5
      if: ${{ inputs.turbo-cache == 'true' && !startsWith(github.ref_name, 'dependabot') }}
      with:
        path: .turbo
        key: turbo-${{ github.sha }}
        restore-keys: |
          turbo-

    - name: install
      shell: bash
      run: yarn install
