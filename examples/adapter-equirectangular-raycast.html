<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PhotoSphereViewer - equirectangular raycast demo</title>

        <link rel="stylesheet" href="/dist/core/index.css" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="photosphere"></div>

        <script type="importmap">
            {
                "imports": {
                    "three": "/node_modules/three/build/three.module.js",
                    "@photo-sphere-viewer/core": "/dist/core/index.module.js",
                    "@photo-sphere-viewer/equirectangular-raycast-adapter": "/dist/equirectangular-raycast-adapter/index.module.js"
                }
            }
        </script>

        <script type="module">
            import { Viewer, DEFAULTS } from '@photo-sphere-viewer/core';
            import { EquirectangularRaycastAdapter } from '@photo-sphere-viewer/equirectangular-raycast-adapter';

            const baseUrl = 'https://photo-sphere-viewer-data.netlify.app/assets/';

            const panos = [
                {
                    url: baseUrl + 'sphere.jpg',
                    caption: 'Parc national du Mercantour <b>&copy; Damien Sorel</b>',
                },
                {
                    url: baseUrl + 'sphere-test.jpg',
                    caption: 'Test sphere',
                },
            ];

            const viewer = new Viewer({
                container: 'photosphere',
                adapter: EquirectangularRaycastAdapter,
                panorama: panos[0].url,
                caption: panos[0].caption,
                loadingImg: baseUrl + 'loader.gif',
                // minFov: 10,
                // fisheye: true,
                // mousemove: false,
                // mousewheel: false,
                // touchmoveTwoFingers: true,
                // mousewheelCtrlKey: true,
                // moveSpeed: 2,
                // zoomSpeed: 2,
                // moveInertia: false,
                navbar: [
                    'zoom',
                    'move',
                    'download',
                    {
                        title: 'Change image',
                        className: 'custom-button',
                        content: '🔄',
                        onClick: (() => {
                            let i = 0;
                            return () => {
                                i = 1 - i;
                                viewer.setPanorama(panos[i].url, {
                                    position: { yaw: 0, pitch: 0 },
                                    zoom: 50,
                                    caption: panos[i].caption,
                                });
                            };
                        })(),
                    },
                    {
                        title: 'Random position',
                        className: 'custom-button',
                        content: '🔀',
                        onClick: () => {
                            viewer.animate({
                                yaw: (((Math.random() - 0.5) * 3) / 2) * Math.PI,
                                pitch: (((Math.random() - 0.5) * 3) / 4) * Math.PI,
                                zoom: Math.random() * 60 + 20,
                                speed: 1500,
                            });
                        },
                    },
                    'caption',
                    'fullscreen',
                ],
                keyboard: 'always',
                keyboardActions: {
                    ...DEFAULTS.keyboardActions,
                    f: (viewer, e) => viewer.toggleFullscreen(),
                    h: (viewer, e) => {
                        if (viewer.panel.isVisible('help')) {
                            viewer.panel.hide();
                        } else {
                            viewer.panel.show({
                                id: 'help',
                                content: 'Help content',
                            });
                        }
                    },
                },
            });

            viewer.addEventListener('click', ({ data }) => {
                console.log('click', data);
            });

            window.viewer = viewer;
        </script>
    </body>
</html>
